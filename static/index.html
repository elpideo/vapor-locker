<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Vapor</title>
  <meta name="color-scheme" content="dark"/>
  <style>
    :root{
      --bg0:#07080a;
      --bg1:#0b0c0f;
      --card:#13151a;
      --card2:#101217;
      --border:#222631;
      --muted:#9aa3b2;
      --text:#e8ecf3;
      --field:#1a1d24;
      --fieldBorder:#2a2f3c;
      --accent:#68ffb6;
      --accentText:#07110b;
      --shadow:0 18px 50px rgba(0,0,0,.55);
      --radius:18px;
    }
    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 560px at 20% -10%, rgba(104,255,182,.10), transparent 60%),
        radial-gradient(800px 520px at 100% 0%, rgba(104,255,182,.06), transparent 58%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .wrap{max-width:720px;margin:0 auto;padding:56px 18px 56px;}
    .brand{
      font-weight:800;
      letter-spacing:.06em;
      font-size:46px;
      line-height:1.05;
    }
    .brandDot{color:var(--accent);}

    .stack{display:flex;flex-direction:column;gap:18px;}
    .card{
      background: linear-gradient(180deg, rgba(19,21,26,1), rgba(15,17,22,1));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow: var(--shadow);
      padding:18px;
    }
    .cardTitle{
      font-weight:800;
      letter-spacing:.18em;
      color:var(--accent);
      font-size:14px;
      margin-bottom:14px;
    }
    .fieldRow{display:flex;gap:12px;align-items:center;}
    .fieldCol{display:flex;flex-direction:column;gap:12px;}
    input[type=text], textarea{
      width:100%;
      background:var(--field);
      color:var(--text);
      border:1px solid var(--fieldBorder);
      border-radius:14px;
      padding:14px 14px;
      outline:none;
    }
    input[type=text]{height:52px;}
    textarea{min-height:140px;resize:vertical;}
    input[type=text]::placeholder, textarea::placeholder{color:rgba(154,163,178,.65);}
    input[type=text]:focus, textarea:focus{border-color:rgba(104,255,182,.55);box-shadow:0 0 0 4px rgba(104,255,182,.10);}

    .actionBtn{
      flex:0 0 auto;
      width:52px;height:52px;
      border-radius:14px;
      border:0;
      background:var(--accent);
      color:var(--accentText);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow: 0 14px 30px rgba(104,255,182,.18);
      transition: transform .08s ease, filter .08s ease;
    }
    .actionBtn:active{transform: translateY(1px);filter:brightness(.95);}
    .icon{width:22px;height:22px;display:block;}

    .resultSurface{
      position:relative;
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px 92px 14px 14px;
      min-height:56px;
      margin-top:14px;
    }
    .resultText{
      margin:0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:14px;
      line-height:1.45;
      white-space:pre-wrap;
      word-break:break-word;
      color:rgba(232,236,243,.86);
    }
    .resultActions{
      position:absolute;
      top:10px;right:10px;
      display:flex;
      gap:8px;
      align-items:center;
    }
    .copyBtn, .eyeBtn{
      width:32px;height:32px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: rgba(232,236,243,.85);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .copyBtn:active, .eyeBtn:active{transform: translateY(1px);}
    .copyBtn.copied{background: rgba(104,255,182,.16);border-color: rgba(104,255,182,.30);color: var(--accent);}
    .eyeBtn.revealed{background: rgba(255,255,255,.07);border-color: rgba(255,255,255,.12);}

    .divider{
      height:1px;
      margin:6px 10px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      border-radius:999px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.10);
      color: rgba(232,236,243,.9);
      font-weight:650;
    }
    .muted{color:var(--muted);font-weight:550;}
    .rowBetween{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;}
    .check{display:inline-flex;align-items:center;gap:10px;color:rgba(232,236,243,.86);}
    .check input{width:16px;height:16px;}
    .srOnly{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
    .hidden{display:none;}

    .netStatus{
      margin-top:12px;
      font-size:13px;
      color:rgba(154,163,178,.85);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="stack">
      <header>
        <div class="brand">VAPOR<span class="brandDot">-</span>LOCKER</div>
        <div class="netStatus" id="netStatus">Initialisation…</div>
      </header>

      <section class="card">
        <div class="cardTitle">RETRIEVE</div>
        <form id="getForm" class="fieldRow" autocomplete="off">
          <label class="srOnly" for="get_key">Key</label>
          <input id="get_key" name="key" type="text" maxlength="255" placeholder="Key" autocomplete="off"/>
          <button class="actionBtn" type="submit" aria-label="Get">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>

        <div id="getMessage" class="resultSurface hidden">
          <div class="pill" id="getMessageText"></div>
        </div>

        <div id="getValue" class="resultSurface hidden">
          <pre id="resultDisplay" class="resultText">*******</pre>
          <pre id="resultPlain" class="srOnly"></pre>
          <div class="resultActions">
            <button class="eyeBtn" type="button" id="revealBtn" aria-label="Afficher" aria-pressed="false">
              <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2"/>
              </svg>
              <span class="srOnly">Afficher</span>
            </button>
            <button class="copyBtn" type="button" id="copyBtn" aria-label="Copier">
              <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M9 9h10v10H9V9Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span class="srOnly">Copier</span>
            </button>
          </div>
        </div>
      </section>

      <div class="divider" aria-hidden="true"></div>

      <section class="card">
        <div class="cardTitle">STORE</div>
        <form id="setForm" class="fieldCol" autocomplete="off">
          <label class="srOnly" for="set_key">Key</label>
          <input id="set_key" name="key" type="text" maxlength="255" placeholder="Key" autocomplete="off"/>

          <label class="srOnly" for="set_value">Value</label>
          <textarea id="set_value" name="value" maxlength="100000" placeholder="Content or Secret"></textarea>

          <div class="rowBetween">
            <label class="check">
              <input id="ephemeral" name="ephemeral" type="checkbox"/>
              <span class="muted" title="Content will be evaporated after the first reading">🌬️ EVAPORATING CONTENT</span>
            </label>
            <button class="actionBtn" type="submit" aria-label="Set">
              <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </form>

        <div id="setMessage" class="resultSurface hidden">
          <div class="pill" id="setMessageText"></div>
        </div>
      </section>
    </div>
  </main>

  <script defer src="/static/app.js"></script>
</body>
</html>
